<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Commerce — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Mini<span>.</span>Commerce</div>
    <p class="auth-subtitle">Sign in to your account or create one</p>

    {% if error %}
    <div class="alert alert-error">⚠ {{ error }}</div>
    {% endif %}

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="form-login" method="post" action="/login">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" placeholder="your_username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.7rem">Sign In</button>
    </form>

    <!-- Register Form (hidden by default) -->
    <form id="form-register" method="post" action="/register" style="display:none">
      <div class="form-group">
        <label class="form-label">Choose Username</label>
        <input class="form-control" type="text" name="username" placeholder="your_username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="min 8 characters" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.7rem">Create Account</button>
    </form>

    <p style="text-align:center;font-size:0.8rem;color:var(--muted);margin-top:1.5rem">
      Demo: <strong style="color:var(--text)">demo</strong> / <strong style="color:var(--text)">demo123</strong>
    </p>
  </div>
</div>
<script>
function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}
</script>
</body>
</html>
